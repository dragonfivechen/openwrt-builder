name: Build OpenWrt

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: '源码仓库 URL'
        required: true
        default: 'https://github.com/immortalwrt/immortalwrt'
      source_branch:
        description: '源码分支'
        required: true
        default: 'openwrt-24.10'
      target:
        description: '目标设备配置'
        required: true
        default: 'x86_64'
      ssh_connect:
        description: '启用 SSH 连接（编译前暂停）'
        required: false
        default: 'false'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 初始化环境
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3-setuptools rsync swig unzip zlib1g-dev file wget
          sudo apt-get autoremove -y -qq

      - name: 克隆源码
        run: |
          git clone --depth 1 ${{ github.event.inputs.source_url }} -b ${{ github.event.inputs.source_branch }} openwrt
          cd openwrt

      - name: 加载自定义配置
        run: |
          if [ -f configs/${{ github.event.inputs.target }}.seed ]; then
            cp configs/${{ github.event.inputs.target }}.seed openwrt/.config
            echo "已加载 ${{ github.event.inputs.target }}.seed 配置"
          else
            echo "使用默认配置"
          fi

      - name: 更新 Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: SSH 连接（可选）
        if: ${{ github.event.inputs.ssh_connect == 'true' }}
        uses: mxschmitt/action-tmate@v3

      - name: 编译固件
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s
          echo "编译完成"

      - name: 输出固件
        run: |
          mkdir -p firmware
          find openwrt/bin/targets -type f \( -name "*.bin" -o -name "*.img*" -o -name "*combined*" -o -name "*efi*" -o -name "*kernel*" -o -name "*rootfs*" \) -exec cp {} firmware/ \;
          ls -lh firmware/

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-firmware-${{ github.event.inputs.target }}
          path: firmware/
          retention-days: 7
