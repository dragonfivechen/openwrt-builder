name: Build OpenWrt Docker Image

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: '源码仓库 URL'
        required: true
        default: 'https://github.com/immortalwrt/immortalwrt'
      source_branch:
        description: '源码分支'
        required: true
        default: 'openwrt-24.10'
      image_tag:
        description: 'Docker 镜像标签'
        required: true
        default: 'latest'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: openwrt-docker

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 初始化环境
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3-setuptools rsync swig unzip zlib1g-dev file wget qemu-utils
          sudo apt-get autoremove -y -qq

      - name: 克隆源码
        run: |
          git clone --depth 1 \${{ inputs.source_url }} -b \${{ inputs.source_branch }} openwrt

      - name: 加载 Docker 配置
        run: |
          mkdir -p openwrt/files
          cp configs/docker_x86_64.seed openwrt/.config

      - name: 自定义 Docker 入口脚本
        run: |
          cat > openwrt/files/etc/init.d/docker-boot << 'INIT'
#!/bin/sh
# First boot setup for Docker container
[ -f /etc/config/network ] || {
  uci set network.lan=interface
  uci set network.lan.ifname=eth0
  uci set network.lan.proto=dhcp
  uci commit network
}
exit 0
INIT
          chmod +x openwrt/files/etc/init.d/docker-boot

      - name: 更新 Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 展开配置
        run: |
          cd openwrt
          make defconfig

      - name: 编译
        run: |
          cd openwrt
          make -j\$(nproc) V=s || make -j1 V=s
          echo "编译完成"

      - name: 查找 rootfs
        id: find_rootfs
        run: |
          ROOTFS=\$(find openwrt/bin/targets -name "*rootfs.tar.gz" | head -1)
          echo "rootfs=\$ROOTFS" >> \$GITHUB_OUTPUT
          ls -lh \$ROOTFS

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: \${{ env.REGISTRY }}
          username: \${{ github.actor }}
          password: \${{ secrets.GITHUB_TOKEN }}

      - name: 构建 Docker 镜像
        run: |
          ROOTFS=\${{ steps.find_rootfs.outputs.rootfs }}
          mkdir -p docker-build
          tar xzf \$ROOTFS -C docker-build
          cat > docker-build/Dockerfile << 'DOCKERFILE'
FROM scratch
ADD --chown=0:0 . /
ENV PATH=/usr/sbin:/usr/bin:/sbin:/bin
CMD ["/sbin/init"]
DOCKERFILE

          IMAGE=\${{ env.REGISTRY }}/\${{ github.repository_owner }}/\${{ env.IMAGE_NAME }}
          docker build -t \$IMAGE:\${{ inputs.image_tag }} docker-build/

      - name: 推送镜像
        run: |
          IMAGE=\${{ env.REGISTRY }}/\${{ github.repository_owner }}/\${{ env.IMAGE_NAME }}
          docker push \$IMAGE:\${{ inputs.image_tag }}
          echo "✅ 镜像已推送: \$IMAGE:\${{ inputs.image_tag }}"
