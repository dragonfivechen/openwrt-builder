name: Build OpenWrt Docker Image

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: '源码仓库 URL'
        required: true
        default: 'https://github.com/immortalwrt/immortalwrt'
      source_branch:
        description: '源码分支'
        required: true
        default: 'openwrt-24.10'
      image_tag:
        description: 'Docker 镜像标签'
        required: true
        default: 'latest'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: openwrt-docker

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Init
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-setuptools rsync swig unzip zlib1g-dev file wget qemu-utils

      - name: Clone
        run: git clone --depth 1 "${{ inputs.source_url }}" -b "${{ inputs.source_branch }}" openwrt

      - name: Config
        run: |
          cp configs/docker_x86_64.seed openwrt/.config
          cd openwrt && ./scripts/feeds update -a && ./scripts/feeds install -a && make defconfig

      - name: Build
        run: cd openwrt && make -j$(nproc) V=s

      - name: Rootfs
        id: rootfs
        run: |
          ROOTFS=$(find openwrt/bin/targets -name "*rootfs.tar.gz" | head -1)
          echo "rootfs=$ROOTFS" >> "$GITHUB_OUTPUT"

      - name: GHCR Login
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Build
        run: |
          ROOTFS="${{ steps.rootfs.outputs.rootfs }}"
          mkdir -p docker-build && tar xzf "$ROOTFS" -C docker-build
          echo "FROM scratch" > docker-build/Dockerfile
          echo "ADD --chown=0:0 . /" >> docker-build/Dockerfile
          echo 'ENV PATH=/usr/sbin:/usr/bin:/sbin:/bin' >> docker-build/Dockerfile
          echo 'CMD ["/sbin/init"]' >> docker-build/Dockerfile
          IMAGE="${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}"
          docker build -t "$IMAGE:${{ inputs.image_tag }}" docker-build/

      - name: Push
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}"
          docker push "$IMAGE:${{ inputs.image_tag }}"
